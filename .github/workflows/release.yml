name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build and package only, skip release creation)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and package
        run: bun run release

      - name: Verify artifacts exist
        run: |
          test -f linkedin-hide-viewed-jobs.user.js || exit 1
          test -f linkedin-hide-viewed-jobs-chrome.zip || exit 1
          test -f linkedin-hide-viewed-jobs-firefox.zip || exit 1

      - name: Get version
        id: version
        run: echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Configure Git
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate release notes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="$PREV_TAG..HEAD"
          fi
          
          echo "## ${{ steps.version.outputs.tag }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### What's Changed" >> release-notes.md
          echo "" >> release-notes.md
          git log --pretty=format:"- %s" $RANGE >> release-notes.md
          echo "" >> release-notes.md
          echo "" >> release-notes.md
          echo "### Downloads" >> release-notes.md
          echo "" >> release-notes.md
          echo "- **Userscript**: \`linkedin-hide-viewed-jobs.user.js\`" >> release-notes.md
          echo "- **Chrome Extension**: \`linkedin-hide-viewed-jobs-chrome.zip\`" >> release-notes.md
          echo "- **Firefox Extension**: \`linkedin-hide-viewed-jobs-firefox.zip\`" >> release-notes.md

      - name: Create tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            linkedin-hide-viewed-jobs.user.js \
            linkedin-hide-viewed-jobs-chrome.zip \
            linkedin-hide-viewed-jobs-firefox.zip \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release-notes.md \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Dry run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "=== DRY RUN ==="
          echo "Version: $(node -p "require('./package.json').version")"
          echo ""
          echo "Files that would be attached:"
          ls -lh linkedin-hide-viewed-jobs.user.js linkedin-hide-viewed-jobs-chrome.zip linkedin-hide-viewed-jobs-firefox.zip
